<header xmlns:th="http://www.thymeleaf.org" 
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        th:fragment="header" class="main-header">
    <div class="container flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="logo-text">ECDF <span class="logo-accent">Assessments</span></h1>
        </div>
        
        <div class="flex items-center gap-6" sec:authorize="isAuthenticated()">
            <nav class="flex gap-2">
                <a th:href="@{/}" class="nav-link" th:classappend="${requestURI == '/' ? 'active' : ''}">Dashboard</a>
                <a th:href="@{/framework}" class="nav-link" th:classappend="${requestURI.startsWith('/framework') ? 'active' : ''}">Framework</a>
                <a th:href="@{/team}" class="nav-link" th:classappend="${requestURI == '/team' ? 'active' : ''}">My Team</a>
                <a th:href="@{/evidence}" class="nav-link" th:classappend="${requestURI.startsWith('/evidence') ? 'active' : ''}">Evidence Log</a>
                <a th:href="@{/assessment/queue}" class="nav-link" th:classappend="${requestURI != null and requestURI.startsWith('/assessment') ? 'active' : ''}">Assessments</a>
                <a th:href="@{/pdp}" class="nav-link" th:classappend="${requestURI != null and requestURI.startsWith('/pdp') ? 'active' : ''}">Pathways</a>
            </nav>
            
            <div class="flex items-center pl-6 gap-4 header-divider">
                <div class="user-profile-badge flex items-center gap-2">
                    <span class="status-dot"></span>
                    <span class="text-sm user-email" sec:authentication="name">user@example.com</span>
                </div>
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-logout">Logout</button>
                </form>
            </div>
        </div>
        
        <div class="flex items-center" sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="btn btn-primary btn-sm">Sign In</a>
        </div>
    </div>
</header>
