<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base.html}">
<head>
    <title>Framework Management - ECDF Admin</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Framework Management</h1>
            <div class="text-sm text-secondary">
                <i class="fas fa-info-circle mr-2"></i> Configure the 8 core pillars and their proficiency levels.
            </div>
        </div>

        <div th:each="definition : ${pillarDefinitions}" class="glass-card mb-8 overflow-hidden">
            <div class="bg-primary-faint p-4 flex justify-between items-center border-b border-white/10">
                <div class="flex items-center gap-4">
                    <div class="bg-primary text-white font-bold p-2 rounded shadow-lg" th:text="${definition.pillar}">THINKS</div>
                    <div>
                        <h2 class="text-xl font-bold" th:text="${definition.title}">Analytical Thinking</h2>
                        <span class="text-xs text-secondary italic">Core Pillar ID: [[${definition.pillar}]]</span>
                    </div>
                </div>
            </div>

            <form th:action="@{/admin/framework}" method="post" class="p-6">
                <input type="hidden" name="pillar" th:value="${definition.pillar.name()}">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="form-group">
                        <label class="block text-sm font-semibold mb-2">Display Title (Short Name)</label>
                        <input type="text" name="title" th:value="${definition.title}" class="input w-full" placeholder="e.g. Critical Thinking">
                    </div>
                    <div class="form-group">
                        <label class="block text-sm font-semibold mb-2">Full Description</label>
                        <textarea name="description" th:text="${definition.description}" class="input w-full h-24" placeholder="Overall purpose of this pillar..."></textarea>
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-4 border-b border-white/5 pb-2">Proficiency Level Descriptions (1-5)</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <div th:each="detail : ${definition.levelDetails}" class="flex gap-4 items-start p-3 rounded bg-white/5 border border-white/10">
                            <div class="bg-accent-faint text-accent font-bold h-8 w-8 rounded-full flex items-center justify-center flex-shrink-0" th:text="${detail.level}">1</div>
                            <div class="flex-grow">
                                <label class="hidden">Level [[${detail.level}]] Description</label>
                                <textarea th:name="'levelDescription_' + ${detail.level}" th:text="${detail.description}" class="input w-full" rows="2" placeholder="Describe what excellence looks like at this level..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end pt-4 border-t border-white/5">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save mr-2"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
