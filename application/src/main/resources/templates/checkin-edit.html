<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base.html}">
<head>
    <title th:text="${'Edit Check-In - ' + developer.fullName}">Edit Check-In</title>
</head>
<body>

<main layout:fragment="content">
    <div class="mb-6">
        <h1 class="text-3xl font-bold mb-1" th:text="${'Edit Check-In: ' + developer.fullName}">Edit Check-In</h1>
        <p class="text-muted" th:text="${developer.grade.name}">Current Grade</p>
    </div>

    <form th:action="@{/checkins/{id}/update(id=${checkIn.id})}" method="post" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="card glassmorphism p-6 space-y-4">
                <h2 class="text-xl font-semibold text-glow">Review Details</h2>
                
                <div class="mb-4">
                    <label for="targetGradeId" class="block text-sm font-medium text-gray-300 mb-2">Target Grade</label>
                    <select id="targetGradeId" name="targetGradeId" class="form-control w-full p-2.5 rounded-md border border-gray-700 bg-darker text-gray-200 focus:border-primary shadow-inner" required>
                        <option value="" disabled>Select the grade to evaluate against...</option>
                        <option th:each="grade : ${grades}" th:value="${grade.id}" th:text="${grade.name}" 
                                th:selected="${developer.grade.id == grade.id}">Grade Name</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="managerNotes" class="block text-sm font-medium text-gray-300 mb-2">Manager Review Summary</label>
                    <textarea id="managerNotes" name="managerNotes" rows="10" 
                              class="form-control w-full p-2.5 rounded-md border border-gray-700 bg-darker text-gray-200 focus:border-primary shadow-inner" required 
                              th:text="${checkIn.managerNotes}"></textarea>
                </div>
            </div>

            <input type="hidden" name="action" id="checkinAction" value="finalize">
            <div class="flex justify-end gap-3 mt-4">
                <a th:href="@{/checkins/user/{userId}(userId=${developer.id})}" class="btn btn-secondary shadow-sm">Cancel</a>
                <button type="submit" onclick="document.getElementById('checkinAction').value='draft'" class="btn btn-secondary shadow-sm">Save as Draft</button>
                <button type="submit" onclick="document.getElementById('checkinAction').value='finalize'" class="btn btn-primary glow-effect shadow-md">Complete Check-In</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="card glassmorphism p-6 bg-primary/5">
                <h3 class="text-lg font-semibold mb-3 text-glow">Draft Score Profile</h3>
                <p class="text-xs text-muted mb-4 italic">Scores captured when the draft was started.</p>
                <div class="w-full flex justify-center mb-4">
                    <canvas id="scoreRadarChart" style="max-height: 250px;"></canvas>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    <div th:each="pillar : ${pillars}" class="flex justify-between items-center text-sm p-2 rounded-md border border-gray-700/50 bg-gray-800/20">
                        <span th:text="${pillar.name()}" class="font-medium text-gray-300">PILLAR NAME</span>
                        <div class="flex space-x-4 text-xs">
                            <span class="text-blue-400">Target: <span class="font-bold" th:text="${developer.getExpectedPillarLevel(pillar).value()}">N/A</span></span>
                            <span class="text-primary">Actual: <span class="font-bold" th:text="${checkIn.holisticScores.containsKey(pillar) ? checkIn.holisticScores.get(pillar).value() : 0}">0</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('scoreRadarChart');
            if(ctx) {
                const labels = /*[[${pillars}]]*/ [];
                const actualScores = /*[[${checkIn.holisticScores}]]*/ {};
                
                const data = labels.map(p => {
                    const scoreObj = actualScores[p];
                    return scoreObj ? scoreObj.value : 0;
                });
                
                const formattedLabels = labels.map(label => {
                    return label.split('_').map(word => word.charAt(0) + word.slice(1).toLowerCase()).join(' ');
                });

                new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: formattedLabels,
                        datasets: [{
                            label: 'Captured Scores',
                            data: data,
                            backgroundColor: 'rgba(124, 58, 237, 0.2)',
                            borderColor: 'rgba(124, 58, 237, 0.8)',
                            pointBackgroundColor: 'rgba(167, 139, 250, 1)',
                            pointBorderColor: '#fff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                pointLabels: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 10 } },
                                ticks: { min: 0, max: 5, stepSize: 1, color: 'rgba(255, 255, 255, 0.5)', backdropColor: 'transparent' }
                            }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        });
        /*]]>*/
    </script>
</main>

</body>
</html>
