<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base.html}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Edit Draft Check-In - ' + developer.fullName}">Edit Draft Check-In</title>
</head>
<body>

<main layout:fragment="content">
    <div class="mb-6">
        <div class="flex items-center gap-2 text-yellow-500 mb-1">
            <span class="material-icons text-sm">edit_note</span>
            <span class="text-xs font-bold uppercase tracking-wider">Draft Mode</span>
        </div>
        <h1 class="text-3xl font-bold mb-1" th:text="${'Edit Check-In: ' + developer.fullName}">Edit Check-In</h1>
        <p class="text-muted" th:text="${developer.grade.name}">Current Grade</p>
    </div>

    <form th:action="@{/checkins/{id}/update(id=${checkIn.id})}" method="post" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="card glassmorphism p-6 space-y-4">
                <h2 class="text-xl font-semibold text-glow">Review Details</h2>
                
                <div class="mb-4">
                    <label for="targetGradeId" class="block text-sm font-medium text-gray-300 mb-2">Target Grade</label>
                    <select id="targetGradeId" name="targetGradeId" class="form-control w-full p-2.5 rounded-md border border-gray-700 bg-darker text-gray-200 focus:border-primary shadow-inner" required>
                        <option value="" disabled>Select the grade to evaluate against...</option>
                        <option th:each="grade : ${grades}" th:value="${grade.id}" th:text="${grade.name}">Grade Name</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="managerNotes" class="block text-sm font-medium text-gray-300 mb-2">Manager Review Summary</label>
                    <textarea id="managerNotes" name="managerNotes" rows="10" 
                              th:text="${checkIn.managerNotes}"
                              class="form-control w-full p-2.5 rounded-md border border-gray-700 bg-darker text-gray-200 focus:border-primary shadow-inner" required></textarea>
                </div>
            </div>

            <input type="hidden" name="action" id="checkinAction" value="finalize">
            <div class="flex justify-end gap-3 mt-4">
                <a th:href="@{/checkins/user/{userId}(userId=${developer.id})}" class="btn btn-secondary shadow-sm">Cancel</a>
                <button type="submit" onclick="document.getElementById('checkinAction').value='draft'" class="btn btn-secondary shadow-sm">Update Draft</button>
                <button type="submit" onclick="document.getElementById('checkinAction').value='finalize'" class="btn btn-primary glow-effect shadow-md">Complete Check-In</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="card glassmorphism p-6 border-l-4 border-info bg-info/5">
                <h3 class="text-lg font-semibold mb-2 text-info flex items-center gap-2">
                    <span class="material-icons text-sm">info</span>
                    <span>Note on Freezing</span>
                </h3>
                <p class="text-sm text-gray-400">
                    Completing this check-in will "freeze" the current scores. This creates a permanent point-in-time snapshot.
                </p>
            </div>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('scoreRadarChart');
            if(ctx) {
                const labels = /*[[${pillars}]]*/ [];
                const actualScores = /*[[${checkIn.holisticScores}]]*/ {};
                
                const data = labels.map(p => {
                    const scoreObj = actualScores[p];
                    return scoreObj ? scoreObj.value : 0;
                });
                
                const formattedLabels = labels.map(label => {
                    return label.split('_').map(word => word.charAt(0) + word.slice(1).toLowerCase()).join(' ');
                });

                new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: formattedLabels,
                        datasets: [{
                            label: 'Captured Scores',
                            data: data,
                            backgroundColor: 'rgba(124, 58, 237, 0.2)',
                            borderColor: 'rgba(124, 58, 237, 0.8)',
                            pointBackgroundColor: 'rgba(167, 139, 250, 1)',
                            pointBorderColor: '#fff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                pointLabels: { color: 'rgba(255, 255, 255, 0.7)', font: { size: 10 } },
                                ticks: { min: 0, max: 5, stepSize: 1, color: 'rgba(255, 255, 255, 0.5)', backdropColor: 'transparent' }
                            }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        });
        /*]]>*/
    </script>
</main>

</body>
</html>
