<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base.html}">
<head>
    <title>Login - Engineer Career Development Framework</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-center">
            <div class="col-md-6 col-lg-4">
                <section class="glass-panel" style="margin-top: 10vh;">
                    <h2 style="text-align: center; margin-bottom: 2rem;">Sign In</h2>
                    
                    <div th:if="${param.error}" class="alert alert-danger" style="margin-bottom: 1rem; color: #ff6b6b; background: rgba(255, 107, 107, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255, 107, 107, 0.3);">
                        Invalid username and password.
                    </div>
                    
                    <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom: 1rem; color: #51cf66; background: rgba(81, 207, 102, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(81, 207, 102, 0.3);">
                        You have been logged out.
                    </div>
                    
                    <form th:action="@{/login}" method="post">
                        <!-- Spring Security automatically includes CSRF token if enabled -->
                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label for="username" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username</label>
                            <input type="text" id="username" name="username" class="form-control" style="width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--text-main);" required autofocus />
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 2rem;">
                            <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                            <input type="password" id="password" name="password" class="form-control" style="width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--text-main);" required />
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; border-radius: 8px; font-weight: 600;">Log In</button>
                    </form>
                    
                    <div style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                        <p>Default accounts:</p>
                        <ul style="list-style: none; padding: 0; margin-top: 0.5rem;">
                            <li>user / password</li>
                            <li>manager / password</li>
                        </ul>
                    </div>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
