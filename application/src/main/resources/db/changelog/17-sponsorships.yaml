databaseChangeLog:
  - changeSet:
      id: 17-create-sponsorships-table
      author: gemini-cli
      changes:
        - createTable:
            tableName: sponsorships
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: promotion_case_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: sponsor_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: sponsorships
            baseColumnNames: promotion_case_id
            referencedTableName: promotion_cases
            referencedColumnNames: id
            constraintName: fk_sponsorship_promo_case
        - addForeignKeyConstraint:
            baseTableName: sponsorships
            baseColumnNames: sponsor_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_sponsorship_sponsor
