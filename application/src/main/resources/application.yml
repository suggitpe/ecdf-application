spring:
  application:
    name: ecdf
  datasource:
    url: jdbc:h2:mem:ecdf;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  storage:
    # Use environment variable if provided, otherwise default to a local ./data directory
    path: ${FILE_STORAGE_PATH:./data/storage}
