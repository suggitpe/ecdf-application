name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Set up Zulu JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Application Jar (and Run Tests)
        run: ./gradlew clean build --no-daemon

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Build and Push Container Image via Cloud Build
        run: |
          gcloud builds submit --tag gcr.io/ecdf-spring-boot-app-2026/ecdf-mockup .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ecdf-mockup \
            --image gcr.io/ecdf-spring-boot-app-2026/ecdf-mockup \
            --region europe-west2 \
            --port 8080 \
            --allow-unauthenticated
