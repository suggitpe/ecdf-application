name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Set up Zulu JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Application (JUnit/Kotest)
        run: ./gradlew clean build --no-daemon

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: application/build/reports/jacoco/test/html/

      - name: Upload Built Jar
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: application-jar
          path: |
            application/build/libs/application-*.jar
            !application/build/libs/*-plain.jar

  deploy:
    name: Deploy to GCP
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Built Jar
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: application/build/libs/

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Build and Push Container via Cloud Build
        run: |
          gcloud builds submit --tag gcr.io/ecdf-spring-boot-app-2026/ecdf-mockup .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ecdf-mockup \
            --image gcr.io/ecdf-spring-boot-app-2026/ecdf-mockup \
            --region europe-west2 \
            --port 8080 \
            --allow-unauthenticated
